    if (!s) return {value:0,unit:''};
    var m = s.match(/^([\d.]+)\s*([A-Za-z]+)/i);
    if (!m) { var v=parseFloat(s); return {value:isNaN(v)?0:v,unit:''}; }
    var v=parseFloat(m[1]), u=m[2].toUpperCase();
    if (u==='GB') return {value:v,unit:'GB'};
    if (u==='MB') return {value:v/1024,unit:'GB'};
    if (u==='KB') return {value:v/1048576,unit:'GB'};
    if (u==='TB') return {value:v*1024,unit:'GB'};
    return {value:v,unit:u};
  }
  var NUM_COLS = [1, 2];
var selectedSet = new Set();

// ═══════ 分享模式检测 ═══════
(function checkShareMode(){
  var hash = location.hash;
  var m = hash.match(/^#share=(.+)/);
  if(!m) return;
  try {
    var pack = JSON.parse(LZString.decompressFromEncodedURIComponent(m[1]));
    if(!pack || !pack.h || !pack.r) return;
    showSharedView(pack.h, pack.r);
  } catch(e) { console.error('Share link parse error:', e); }
})();

function showSharedView(headers, rows) {
  // 隐藏交互视图，显示分享视图
  document.getElementById('mainView').style.display = 'none';
  var fh = document.getElementById('frozenHeader');
  if(fh) fh.style.display = 'none';
  document.getElementById('shareView').style.display = 'block';

  // 渲染表头
  var thead = document.getElementById('shareHead');
  var tr = document.createElement('tr');
  var nTh = document.createElement('th');
  nTh.textContent = '#'; nTh.style.cssText = 'text-align:center;width:40px;';
  tr.appendChild(nTh);
  headers.forEach(function(h) {
    var th = document.createElement('th'); th.textContent = h; tr.appendChild(th);
  });
  thead.appendChild(tr);

  // 渲染数据行
  var tbody = document.getElementById('shareBody');
  rows.forEach(function(cells, i) {
    var r = document.createElement('tr');
    var nTd = document.createElement('td');
    nTd.textContent = i + 1; nTd.style.cssText = 'text-align:center;color:#bbb;font-size:11px;';
    r.appendChild(nTd);
    cells.forEach(function(c) {
      var td = document.createElement('td'); td.textContent = c || ''; r.appendChild(td);
    });
    tbody.appendChild(r);
  });

  document.getElementById('shareTitle').textContent = '已选 \xb7 共 ' + rows.length + ' 行';
  document.title = '已选子表单 \xb7 ' + rows.length + ' 行';
}

function exitShareView() {
  document.getElementById('shareView').style.display = 'none';
  document.getElementById('mainView').style.display = '';
  var fh = document.getElementById('frozenHeader');
  if(fh) fh.style.display = '';
  // 清除 hash 但不刷新
  history.replaceState(null, '', location.pathname);
}

(function init(){
  // 如果处于分享模式，跳过 init
  if(location.hash.indexOf('#share=') === 0) return;
  var th=document.getElementById('tableHead'), tr=document.createElement('tr');
  HEADERS.forEach(function(h,i){
    var thh=document.createElement('th');
    if(FREEZE_ROWS > 0 && i === 0){ thh.style.cssText = 'display:none;'; }
    thh.textContent = h;
    tr.appendChild(thh);
  });
  th.appendChild(tr);
  adjustStickyTops();
  window.addEventListener('resize', adjustStickyTops);
  renderTable(ALL_DATA);
  document.getElementById('searchInfo').textContent='共 '+ALL_DATA.length+' 条记录';
  var mh=document.getElementById('modalHead');
  var nth=document.createElement('th'); nth.textContent='#'; nth.style.cssText='background:#16213e;color:#eee;padding:10px 8px;font-size:12px;width:36px;text-align:center;'; mh.appendChild(nth);
  HEADERS.forEach(function(h,i){
    if(FREEZE_ROWS > 0 && i === 0) return;
    var thh=document.createElement('th'); thh.textContent=h; mh.appendChild(thh);
  });
})();

function renderTable(rows){
  var tb=document.getElementById('tableBody'); tb.innerHTML='';
  if(rows.length===0){ tb.innerHTML='<tr><td colspan="'+HEADERS.length+'" class="empty-tip">没有匹配的记录</td></tr>'; return; }
  rows.forEach(function(row){
    var tr=document.createElement('tr');
    if(selectedSet.has(row._idx)) tr.classList.add('selected');
    tr.dataset.idx=row._idx;
    tr.onclick=function(){ toggleRow(row._idx,tr); };
    var clr = ROW_COLORS[row._idx];
    if(clr){ tr.style.setProperty('background-color', clr, 'important'); }
    if(FREEZE_ROWS > 0 && row.cells.length > 0){
      var excelRow = parseInt(row.cells[0]) || 0;
      if(excelRow > 0) tr.id = 'erow-' + excelRow;
    }
    row.cells.forEach(function(c, ci){
      var td=document.createElement('td');
      if(FREEZE_ROWS > 0 && ci === 0){ td.style.cssText = 'display:none;'; }
      td.textContent = c;
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
}

function toggleRow(idx,tr){
  if(selectedSet.has(idx)){ selectedSet.delete(idx); tr.classList.remove('selected'); }
  else{ selectedSet.add(idx); tr.classList.add('selected'); }
  updateCount();
}

function updateCount(){
  var n=selectedSet.size;
  document.getElementById('countBadge').textContent='已选 '+n+' 行';
  document.getElementById('btnSubmit').disabled=n===0;
}

function clearSelection(){
  selectedSet.clear();
  document.querySelectorAll('#tableBody tr.selected').forEach(function(tr){ tr.classList.remove('selected'); });
  updateCount();
}

function filterTable(){
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  var filtered=q ? ALL_DATA.filter(function(r){ return r.cells.some(function(c){ return c.toLowerCase().indexOf(q)>-1; }); }) : ALL_DATA;
  document.getElementById('searchInfo').textContent=q ? ('共 '+ALL_DATA.length+' 条，显示 '+filtered.length+' 条') : ('共 '+ALL_DATA.length+' 条记录');
  renderTable(filtered);
}

function adjustStickyTops(){
  var fh = document.getElementById('frozenHeader');
  if(!fh) return;
  var h = fh.offsetHeight;
  var ths = document.querySelectorAll('thead th');
  ths.forEach(function(th){ th.style.top = (82 + h) + 'px'; });
}

function scrollToRow(excelRow){
  var target = document.getElementById('erow-' + excelRow);
  if(!target) return;
  target.scrollIntoView({behavior:'smooth', block:'center'});
  target.style.transition = 'background .3s';
  target.style.setProperty('background-color', '#ffe0e6', 'important');
  setTimeout(function(){
    target.style.transition = 'background .8s';
    target.style.setProperty('background-color', '', '');
  }, 800);
}

function openModal(){
  if(selectedSet.size===0) return;
  var selected=ALL_DATA.filter(function(r){ return selectedSet.has(r._idx); });
  var tb=document.getElementById('modalBody'); tb.innerHTML='';
  selected.forEach(function(row,i){
    var tr=document.createElement('tr');
    var nt=document.createElement('td'); nt.textContent=i+1; nt.className='row-num'; tr.appendChild(nt);
    row.cells.forEach(function(c, ci){
      if(FREEZE_ROWS > 0 && ci === 0) return;
      var td=document.createElement('td'); td.textContent=c; td.style.cssText='padding:9px 14px;font-size:13px;color:#333;'; tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
    var sumTr = document.createElement('tr');
    sumTr.style.cssText = 'background:#ffe0e6!important;font-weight:700;border-top:2px solid #e94560;';
    var sumIdx=document.createElement('td'); sumIdx.textContent=''; sumIdx.className='row-num'; sumTr.appendChild(sumIdx);
    var sumLbl=document.createElement('td'); sumLbl.textContent='合计 ('+selected.length+'行)'; sumLbl.style.cssText='padding:9px 14px;color:#e94560;'; sumTr.appendChild(sumLbl);
    for(var ci=1; ci<HEADERS.length; ci++){
      var td=document.createElement('td'); td.style.cssText='padding:9px 14px;';
      if(NUM_COLS.indexOf(ci)>-1){
        var total=0, units={};
        selected.forEach(function(row){ var p=parseSize(row.cells[ci]); total+=p.value; if(p.unit)units[p.unit]=1; });
        var uArr=Object.keys(units), uStr=uArr.length===1?' '+uArr[0]:'';
        td.textContent = total>=1 ? total.toFixed(2)+uStr : (total*1024).toFixed(1)+' MB';
      }
      sumTr.appendChild(td);
    }
    while(sumTr.children.length < HEADERS.length+1){ var tdd=document.createElement('td'); tdd.style.cssText='padding:9px 14px;'; sumTr.appendChild(tdd); }
    if(FREEZE_ROWS > 0){ sumTr.children[0].style.display='none'; }
    tb.appendChild(sumTr);
  document.getElementById('modalTitle').textContent='📋 已选子表单（共 '+selected.length+' 行）';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

// ═══════ 分享链接 ═══════
function createShareLink() {
  var selected = ALL_DATA.filter(function(r) { return selectedSet.has(r._idx); });
  if (selected.length === 0) { alert('请先选中数据行'); return; }

  // 打包：表头（跳过行号列）+ 数据行
  var shareHeaders = FREEZE_ROWS > 0 ? HEADERS.slice(1) : HEADERS.slice();
  var shareRows = selected.map(function(row) {
    return FREEZE_ROWS > 0 ? row.cells.slice(1) : row.cells.slice();
  });

  var pack = { h: shareHeaders, r: shareRows };
  var compressed = LZString.compressToEncodedURIComponent(JSON.stringify(pack));
  var url = location.origin + location.pathname + '#share=' + compressed;

  // ═══ 长度检测：微信内置浏览器限制约 8KB ═══
  var compressedLen = compressed.length;
  var safeLimit = 7500;
  var doCopy = function() {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        var len = url.length;
        alert('分享链接已复制到剪贴板！(' + selected.length + '行)\n\n点击确定后，把地址直接粘贴到您和卖家的对话框即可。');
      }).catch(function() {
        showShareUrlPanel(url, selected.length);
      });
    } else {
      showShareUrlPanel(url, selected.length);
    }
  };

  if (compressedLen > safeLimit) {
    var estimatedSafe = Math.floor(selected.length * safeLimit / compressedLen);
    var msg = '⚠️ 数据量较大（' + selected.length + ' 行）\n\n' +
      '压缩后 ' + compressedLen + ' 字符，超过微信安全上限（约 ' + safeLimit + '）。\n' +
      '微信内可能无法打开此链接。\n\n' +
      '建议：\n' +
      '  1. 减少选中行数至约 ' + estimatedSafe + ' 行以内\n' +
      '  2. 或在电脑浏览器中分享此链接\n\n' +
      '是否仍然复制链接？';
    if (confirm(msg)) {
      doCopy();
    }
  } else {
    doCopy();
  }
}

function showShareUrlPanel(url, count) {
  var panel = document.createElement('div');
  panel.style.cssText = 'position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6)';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;width:92%;max-width:600px;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.3)';
  box.innerHTML = '<div style="padding:16px 20px;background:#1a1a2e;color:#fff;border-radius:12px 12px 0 0;font-size:15px;font-weight:600;">🔗 分享链接（' + count + ' 行数据）</div>' +
    '<textarea readonly style="flex:1;min-height:80px;padding:16px;border:none;font-size:13px;font-family:Consolas,monospace;resize:none;outline:none;word-break:break-all">' + url + '</textarea>' +
    '<div style="padding:12px 20px;border-top:1px solid #eee;display:flex;gap:10px;justify-content:flex-end;background:#fafafa;border-radius:0 0 12px 12px">' +
    '<button onclick="this.closest(\'div\').parentElement.parentElement.remove()" style="background:#eee;color:#333;padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px">关闭</button>' +
    '<button id="shareCopyBtn" style="background:#e94560;color:#fff;padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600">📋 复制链接</button></div>';
  panel.appendChild(box);
  document.body.appendChild(panel);
  panel.onclick = function(e) { if(e.target===panel) panel.remove(); };
  document.getElementById('shareCopyBtn').onclick = function() {
    var ta = box.querySelector('textarea');
    ta.select();
    document.execCommand('copy');
    alert('已复制！直接发给别人即可。');
    panel.remove();
  };
}

document.getElementById('modalOverlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
</script>
