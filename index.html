<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>index</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei","微软雅黑",sans-serif; background: #f0f2f5; }
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: #1a1a2e; color: #fff; padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .toolbar h1 { font-size: 18px; font-weight: 700; flex: 1; }
  .selected-count {
    background: #e94560; color: #fff; padding: 4px 14px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
    min-width: 80px; text-align: center;
  }
  .btn-clear {
    background: transparent; border: 1px solid #e94560; color: #e94560;
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; transition: all .2s;
  }
  .btn-clear:hover { background: #e94560; color: #fff; }
  .btn-submit {
    background: #e94560; color: #fff; padding: 6px 20px;
    border-radius: 6px; cursor: pointer; font-size: 14px;
    font-weight: 600; border: none; transition: all .2s;
  }
  .btn-submit:hover { background: #c73652; }
  .btn-submit:disabled { background: #555; cursor: not-allowed; }
  .search-bar {
    position: sticky; top: 46px; z-index: 90;
    padding: 10px 20px; background: #fff;
    border-bottom: 1px solid #ddd;
    display: flex; gap: 12px; align-items: center;
  }
  .search-bar input {
    flex: 1; padding: 6px 12px; border: 1px solid #ccc;
    border-radius: 6px; font-size: 14px; outline: none;
  }
  .search-bar input:focus { border-color: #e94560; }
  .search-info { font-size: 12px; color: #888; white-space: nowrap; }
  .frozen-header {
    position: sticky; top: 82px; z-index: 80;
    background: #fff; border-bottom: 2px solid #e94560;
    box-shadow: 0 2px 6px rgba(0,0,0,.08);
  }
  .frozen-row {
    display: flex; border-bottom: 1px solid #eee;
    min-height: 36px; align-items: center;
  }
  .frozen-row.empty { min-height: 14px; background: #fafafa; }
  .frozen-cell {
    padding: 6px 14px; font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .frozen-cell a {
    color: #e94560; text-decoration: none; cursor: pointer;
    font-weight: 600; transition: color .15s;
  }
  .frozen-cell a:hover { text-decoration: underline; color: #c73652; }
  .frozen-cell.merged {
    text-align: center; font-weight: 600; color: #555;
    background: #f8f8f8; font-size: 14px;
  }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  thead th {
    background: #16213e; color: #eee; padding: 10px 14px;
    text-align: left; font-size: 13px; font-weight: 600;
    position: sticky; top: 88px; z-index: 50;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid #f0f0f0; cursor: pointer;
    transition: background .12s;
  }
  tbody tr:hover { background: #fff3f5 !important; }
  tbody tr.selected { background: #ffe0e6 !important; border-left: 3px solid #e94560; }
  tbody tr.selected td:first-child { font-weight: 600; color: #e94560; }
  tbody td { padding: 9px 14px; font-size: 13px; color: #333; }
  tbody tr:nth-child(even) { background: #fafafa; }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 12px;
    width: 92%; max-width: 920px; max-height: 86vh;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,.3);
  }
  .modal-header {
    padding: 16px 20px; display: flex; align-items: center;
    justify-content: space-between;
    background: #1a1a2e; color: #fff; border-radius: 12px 12px 0 0;
  }
  .modal-header h2 { font-size: 16px; }
  .modal-close {
    background: none; border: none; color: #aaa;
    font-size: 22px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: #fff; }
  .modal-body { overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 12px 20px; border-top: 1px solid #eee;
    display: flex; gap: 10px; justify-content: flex-end;
    background: #fafafa; border-radius: 0 0 12px 12px;
  }
  .modal table { width: 100%; }
  .modal thead th {
    position: sticky; top: 0; background: #16213e; color: #eee;
    padding: 10px 14px; text-align: left; font-size: 13px; z-index: 10;
  }
  .modal tbody tr { background: #fff; }
  .modal tbody tr:nth-child(even) { background: #f8f8f8; }
  .btn-export {
    background: #0f3460; color: #fff; padding: 7px 18px;
    border-radius: 6px; border: none; cursor: pointer;
    font-size: 13px; transition: background .2s;
  }
  .btn-export:hover { background: #0a2647; }
  .btn-export.green { background: #16841f; }
  .btn-export.green:hover { background: #115a18; }
  .btn-modal-close {
    background: #eee; color: #333; padding: 7px 18px;
    border-radius: 6px; border: none; cursor: pointer; font-size: 13px;
  }
  .btn-modal-close:hover { background: #ddd; }
  .empty-tip { text-align: center; padding: 60px; color: #aaa; font-size: 15px; }
  .row-num { padding: 9px 10px; text-align: center; color: #bbb; font-size: 11px; }
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="toolbar">
  <h1>📁 index</h1>
  <div class="selected-count" id="countBadge">已选 0 行</div>
  <button class="btn-clear" onclick="clearSelection()">✕ 清除选择</button>
  <button class="btn-submit" id="btnSubmit" onclick="openModal()" disabled>📋 我选好了</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 搜索..." oninput="filterTable()">
  <span class="search-info" id="searchInfo">共 0 条记录</span>
</div>

<div class="frozen-header" id="frozenHeader">
  <div class="frozen-row empty"><div class="frozen-cell">&nbsp;</div></div><div class="frozen-row"><div class="frozen-cell merged">资源说明：目录上99%为 高清PDF版本。   </div></div><div class="frozen-row empty"><div class="frozen-cell">&nbsp;</div></div><div class="frozen-row"><div class="frozen-cell merged">下方红字为漫画分类，点击可跳转相应分类。</div></div><div class="frozen-row"><div class="frozen-cell"></div><div class="frozen-cell"><a href="https://amykio.github.io/manga-list/日漫目录.html" target="_blank" rel="noopener" title="打开: https://amykio.github.io/manga-list/日漫目录.html">1</a></div><div class="frozen-cell"><a href="https://amykio.github.io/manga-list/日漫目录.html" target="_blank" rel="noopener" title="打开: https://amykio.github.io/manga-list/日漫目录.html">日漫目录</a></div><div class="frozen-cell"></div></div><div class="frozen-row"><div class="frozen-cell"></div><div class="frozen-cell"><a href="https://amykio.github.io/manga-list/港漫目录.html" target="_blank" rel="noopener" title="打开: https://amykio.github.io/manga-list/港漫目录.html">2</a></div><div class="frozen-cell"><a href="https://amykio.github.io/manga-list/港漫目录.html" target="_blank" rel="noopener" title="打开: https://amykio.github.io/manga-list/港漫目录.html">港漫目录</a></div><div class="frozen-cell"></div></div><div class="frozen-row"><div class="frozen-cell"></div><div class="frozen-cell"><a href="https://amykio.github.io/manga-list/少女作者.html" target="_blank" rel="noopener" title="打开: https://amykio.github.io/manga-list/少女作者.html">3</a></div><div class="frozen-cell"><a href="https://amykio.github.io/manga-list/少女作者.html" target="_blank" rel="noopener" title="打开: https://amykio.github.io/manga-list/少女作者.html">少女作者</a></div><div class="frozen-cell"></div></div><div class="frozen-row empty"><div class="frozen-cell">&nbsp;</div></div>
</div>

<div class="table-wrap">
  <table id="mainTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">📋 已选子表单</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <table>
        <thead><tr id="modalHead"></tr></thead>
        <tbody id="modalBody"></tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn-export" onclick="exportToExcel()">💾 导出 Excel (.xlsx)</button>
      <button class="btn-export green" onclick="exportToCSV()">💾 导出 CSV</button>
      <button class="btn-modal-close" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<script>
var RAW = {"headers": ["#", "", "", "", ""], "data": [{"_idx": 0, "cells": ["10", "编号", "漫画名", "作者 / 作画", "卷数"]}, {"_idx": 1, "cells": ["11", "都市  B", "", "", ""]}], "row_colors": [null, "#000000"], "freeze_rows": 9};
var HEADERS = RAW.headers;
var ALL_DATA = RAW.data;
var ROW_COLORS = RAW.row_colors || [];
var FREEZE_ROWS = RAW.freeze_rows || 0;

var selectedSet = new Set();

(function init(){
  var th=document.getElementById('tableHead'), tr=document.createElement('tr');
  HEADERS.forEach(function(h,i){
    var thh=document.createElement('th');
    // 隐藏首列（Excel行号列），仅在冻结模式下存在
    if(FREEZE_ROWS > 0 && i === 0){ thh.style.cssText = 'display:none;'; }
    thh.textContent = h;
    tr.appendChild(thh);
  });
  th.appendChild(tr);
  // 动态调整 sticky 偏移
  adjustStickyTops();
  window.addEventListener('resize', adjustStickyTops);
  renderTable(ALL_DATA);
  document.getElementById('searchInfo').textContent='共 '+ALL_DATA.length+' 条记录';
  var mh=document.getElementById('modalHead');
  var nth=document.createElement('th'); nth.textContent='#'; nth.style.cssText='background:#16213e;color:#eee;padding:10px 8px;font-size:12px;width:36px;text-align:center;'; mh.appendChild(nth);
  HEADERS.forEach(function(h,i){
    // 冻结模式下跳过首列（Excel行号）
    if(FREEZE_ROWS > 0 && i === 0) return;
    var thh=document.createElement('th'); thh.textContent=h; mh.appendChild(thh);
  });
})();

function renderTable(rows){
  var tb=document.getElementById('tableBody'); tb.innerHTML='';
  if(rows.length===0){ tb.innerHTML='<tr><td colspan="'+HEADERS.length+'" class="empty-tip">没有匹配的记录</td></tr>'; return; }
  rows.forEach(function(row){
    var tr=document.createElement('tr');
    if(selectedSet.has(row._idx)) tr.classList.add('selected');
    tr.dataset.idx=row._idx;
    tr.onclick=function(){ toggleRow(row._idx,tr); };
    // 应用Excel行背景色
    var clr = ROW_COLORS[row._idx];
    if(clr){ tr.style.setProperty('background-color', clr, 'important'); }
    // 冻结模式下首列为Excel行号，设置id用于锚点跳转
    if(FREEZE_ROWS > 0 && row.cells.length > 0){
      var excelRow = parseInt(row.cells[0]) || 0;
      if(excelRow > 0) tr.id = 'erow-' + excelRow;
    }
    row.cells.forEach(function(c, ci){
      var td=document.createElement('td');
      // 冻结模式下隐藏首列（Excel行号）
      if(FREEZE_ROWS > 0 && ci === 0){ td.style.cssText = 'display:none;'; }
      td.textContent = c;
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
}

function toggleRow(idx,tr){
  if(selectedSet.has(idx)){ selectedSet.delete(idx); tr.classList.remove('selected'); }
  else{ selectedSet.add(idx); tr.classList.add('selected'); }
  updateCount();
}

function updateCount(){
  var n=selectedSet.size;
  document.getElementById('countBadge').textContent='已选 '+n+' 行';
  document.getElementById('btnSubmit').disabled=n===0;
}

function clearSelection(){
  selectedSet.clear();
  document.querySelectorAll('#tableBody tr.selected').forEach(function(tr){ tr.classList.remove('selected'); });
  updateCount();
}

function filterTable(){
  var q=document.getElementById('searchInput').value.trim().toLowerCase();
  var filtered=q ? ALL_DATA.filter(function(r){ return r.cells.some(function(c){ return c.toLowerCase().indexOf(q)>-1; }); }) : ALL_DATA;
  document.getElementById('searchInfo').textContent=q ? ('共 '+ALL_DATA.length+' 条，显示 '+filtered.length+' 条') : ('共 '+ALL_DATA.length+' 条记录');
  renderTable(filtered);
}

function adjustStickyTops(){
  var fh = document.getElementById('frozenHeader');
  if(!fh) return;
  var h = fh.offsetHeight;
  var ths = document.querySelectorAll('thead th');
  ths.forEach(function(th){ th.style.top = (82 + h) + 'px'; });
}

function scrollToRow(excelRow){
  var target = document.getElementById('erow-' + excelRow);
  if(!target) return;
  target.scrollIntoView({behavior:'smooth', block:'center'});
  // 高亮闪烁
  target.style.transition = 'background .3s';
  target.style.setProperty('background-color', '#ffe0e6', 'important');
  setTimeout(function(){
    target.style.transition = 'background .8s';
    target.style.setProperty('background-color', '', '');
  }, 800);
}

function openModal(){
  if(selectedSet.size===0) return;
  var selected=ALL_DATA.filter(function(r){ return selectedSet.has(r._idx); });
  var tb=document.getElementById('modalBody'); tb.innerHTML='';
  selected.forEach(function(row,i){
    var tr=document.createElement('tr');
    var nt=document.createElement('td'); nt.textContent=i+1; nt.className='row-num'; tr.appendChild(nt);
    row.cells.forEach(function(c, ci){
      if(FREEZE_ROWS > 0 && ci === 0) return;
      var td=document.createElement('td'); td.textContent=c; td.style.cssText='padding:9px 14px;font-size:13px;color:#333;'; tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  document.getElementById('modalTitle').textContent='📋 已选子表单（共 '+selected.length+' 行）';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

function isWechat(){ return /micromessenger/i.test(navigator.userAgent); }

async function saveFile(blob, defaultName, typeLabel, textContent){
  if(isWechat()){
    try{
      await navigator.clipboard.writeText(textContent);
      alert('已经复制到剪贴板！请打开备忘录或聊天框粘贴。');
    }catch(e){
      showCopyPanel(textContent, defaultName);
    }
    return;
  }
  if(window.showSaveFilePicker){
    try{
      var handle = await window.showSaveFilePicker({ suggestedName: defaultName });
      var writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    }catch(e){ if(e.name==='AbortError') return; }
  }
  var name = prompt('保存为（输入文件名，留空取消）：', defaultName);
  if(!name) return;
  if(name.indexOf('.')===-1) name += '.' + defaultName.split('.').pop();
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

function showCopyPanel(text, filename){
  var panel = document.createElement('div');
  panel.style.cssText = 'position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6)';
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;width:92%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.3)';
  box.innerHTML = '<div style="padding:16px 20px;background:#1a1a2e;color:#fff;border-radius:12px 12px 0 0;font-size:15px;font-weight:600;">全选复制以下内容</div>' +
    '<textarea readonly style="flex:1;min-height:300px;padding:16px;border:none;font-size:12px;font-family:Consolas,monospace;resize:none;outline:none">'+text.replace(/</g,'&lt;')+'</textarea>' +
    '<div style="padding:12px 20px;border-top:1px solid #eee;display:flex;gap:10px;justify-content:flex-end;background:#fafafa;border-radius:0 0 12px 12px">' +
    '<button onclick="this.closest(\'div\').parentElement.parentElement.remove()" style="background:#eee;color:#333;padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px">关闭</button>' +
    '<button id="copyBtn" style="background:#e94560;color:#fff;padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600">一键复制</button></div>';
  panel.appendChild(box);
  document.body.appendChild(panel);
  panel.onclick = function(e){ if(e.target===panel) panel.remove(); };
  document.getElementById('copyBtn').onclick = function(){
    var ta = box.querySelector('textarea');
    ta.select();
    document.execCommand('copy');
    alert('已复制！去微信聊天框粘贴即可。');
    panel.remove();
  };
}

function exportToCSV(){
  var selected=ALL_DATA.filter(function(r){ return selectedSet.has(r._idx); });
  var csvHeaders = FREEZE_ROWS > 0 ? HEADERS.slice(1) : HEADERS;
  var csv=csvHeaders.join(',')+'\n';
  selected.forEach(function(row){
    var cells = FREEZE_ROWS > 0 ? row.cells.slice(1) : row.cells;
    csv+=cells.map(function(c){ return '"'+c.replace(/"/g,'""')+'"'; }).join(',')+'\n';
  });
  var b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  saveFile(b, '已选漫画_'+new Date().toISOString().slice(0,10)+'.csv', 'CSV', csv);
}

function exportToExcel(){
  var selected=ALL_DATA.filter(function(r){ return selectedSet.has(r._idx); });
  // Build data array of arrays for SheetJS (skip Excel row-number column)
  var xlHeaders = FREEZE_ROWS > 0 ? HEADERS.slice(1) : HEADERS.slice();
  var aoa = [xlHeaders];
  selected.forEach(function(row){
    var cells = FREEZE_ROWS > 0 ? row.cells.slice(1) : row.cells.slice();
    aoa.push(cells);
  });
  // Summary row
  if(typeof NUM_COLS !== 'undefined' && NUM_COLS.length > 0){
    var _sizes={}, _units={};
    NUM_COLS.forEach(function(ci){ _sizes[ci]=0; _units[ci]={}; });
    selected.forEach(function(row){
      NUM_COLS.forEach(function(ci){ var p=parseSize(row.cells[ci]); _sizes[ci]+=p.value; if(p.unit)_units[ci][p.unit]=1; });
    });
    var sumR=['合计('+selected.length+'行)'];
    for(var ci=1; ci<HEADERS.length; ci++){
      if(NUM_COLS.indexOf(ci)>-1){
        var ua=Object.keys(_units[ci]);
        sumR.push(_sizes[ci]>=1 ? _sizes[ci].toFixed(2)+(ua.length===1?' '+ua[0]:'') : (_sizes[ci]*1024).toFixed(1)+' MB');
      } else sumR.push('');
    }
    aoa.push(sumR);
  }
  // Generate real XLSX via SheetJS
  var ws = XLSX.utils.aoa_to_sheet(aoa);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  var wbout = XLSX.write(wb, {type:'array', bookType:'xlsx'});
  var blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  // TSV for WeChat clipboard fallback
  var tsv = HEADERS.join('\t')+'\n';
  selected.forEach(function(row){ tsv += row.cells.join('\t')+'\n'; });
  if(aoa.length > selected.length+1){ tsv += aoa[aoa.length-1].join('\t'); }
  saveFile(blob, '已选数据_'+new Date().toISOString().slice(0,10)+'.xlsx', 'Excel', tsv);
}

document.getElementById('modalOverlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
</script>
</body>
</html>
